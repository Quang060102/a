<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Menu QR Gọi Món</title>
  <style>
    :root{
      --bg:#0f0f10;
      --card:#18181b;
      --soft:#232326;
      --line:#2d2d31;
      --text:#f5f5f5;
      --muted:#a1a1aa;
      --primary:#ffb400;
      --danger:#ef4444;
      --success:#22c55e;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,sans-serif;
    }

    body{
      padding-bottom:110px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(15,15,16,.96);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      padding:12px;
    }

    .brand{
      font-size:20px;
      font-weight:700;
      color:var(--primary);
      margin-bottom:10px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .input, .select, .textarea{
      width:100%;
      background:var(--card);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:10px;
      padding:12px;
      font-size:15px;
      outline:none;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:10px 12px 0;
      position:sticky;
      top:112px;
      z-index:999;
      background:rgba(15,15,16,.96);
      backdrop-filter:blur(10px);
    }

    .tabs::-webkit-scrollbar{display:none}

    .tab-btn{
      white-space:nowrap;
      border:none;
      background:var(--soft);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }

    .tab-btn.active{
      background:var(--primary);
      color:#111;
    }

    .content{
      padding:12px;
    }

    .section{
      margin-bottom:20px;
    }

    .section-title{
      font-size:18px;
      font-weight:700;
      color:var(--primary);
      margin:10px 0 12px;
      padding-left:10px;
      border-left:4px solid var(--primary);
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }

    .item-left{
      flex:1;
      min-width:0;
    }

    .item-name{
      font-size:16px;
      font-weight:700;
      margin-bottom:6px;
    }

    .item-meta{
      font-size:13px;
      color:var(--muted);
    }

    .price{
      color:var(--primary);
      font-weight:700;
    }

    .item-right{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:flex-end;
      gap:10px;
    }

    .qty{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .qty button{
      width:34px;
      height:34px;
      border:none;
      border-radius:10px;
      background:var(--primary);
      color:#111;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }

    .qty button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .count{
      min-width:24px;
      text-align:center;
      font-size:16px;
      font-weight:700;
      color:var(--primary);
    }

    .sold-out{
      opacity:.45;
      pointer-events:none;
    }

    .sold-out-badge{
      display:inline-block;
      margin-top:6px;
      color:#111;
      background:#f59e0b;
      border-radius:999px;
      padding:4px 8px;
      font-size:12px;
      font-weight:700;
    }

    .cart-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:1200;
      background:#141416;
      border-top:2px solid var(--primary);
      box-shadow:0 -10px 30px rgba(0,0,0,.35);
      padding:12px;
      display:none;
    }

    .cart-bar-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .cart-summary{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .cart-summary strong{
      color:var(--primary);
      font-size:16px;
    }

    .cart-summary span{
      color:var(--muted);
      font-size:13px;
    }

    .primary-btn{
      border:none;
      background:var(--primary);
      color:#111;
      border-radius:12px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
    }

    .primary-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .ghost-btn{
      border:none;
      background:var(--soft);
      color:var(--text);
      border-radius:12px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.6);
      display:none;
      z-index:1300;
      padding:14px;
    }

    .drawer{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      max-height:78vh;
      overflow:auto;
    }

    .drawer-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .drawer-title{
      font-size:18px;
      font-weight:700;
      color:var(--primary);
    }

    .icon-btn{
      border:none;
      background:transparent;
      color:var(--text);
      font-size:24px;
      cursor:pointer;
    }

    .cart-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:12px 0;
    }

    .cart-item{
      background:var(--soft);
      border-radius:14px;
      padding:12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }

    .cart-item-name{
      font-weight:700;
      margin-bottom:6px;
    }

    .cart-item-sub{
      color:var(--muted);
      font-size:13px;
    }

    .empty{
      color:var(--muted);
      text-align:center;
      padding:20px 10px;
    }

    .totals{
      border-top:1px solid var(--line);
      padding-top:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .total-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:15px;
    }

    .total-row strong{
      color:var(--primary);
      font-size:18px;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .status{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }

    .status.ok{color:var(--success)}
    .status.err{color:var(--danger)}

    .hidden{display:none !important}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">🍺 Menu QR gọi món</div>
    <div class="controls">
      <select id="tableSelect" class="select"></select>
      <textarea id="orderNote" class="textarea" rows="2" placeholder="Ghi chú đơn, ví dụ: lên món chậm, không cay..."></textarea>
    </div>
  </div>

  <div id="tabs" class="tabs"></div>
  <div id="content" class="content"></div>

  <div id="cartBar" class="cart-bar">
    <div class="cart-bar-inner">
      <div class="cart-summary">
        <strong id="cartCountText">0 món</strong>
        <span id="cartTotalText">Tạm tính: 0đ</span>
      </div>
      <button class="primary-btn" id="openCartBtn">Xem giỏ hàng</button>
    </div>
  </div>

  <div id="cartOverlay" class="overlay">
    <div class="drawer">
      <div class="drawer-head">
        <div class="drawer-title">🛒 Giỏ hàng</div>
        <button class="icon-btn" id="closeCartBtn">×</button>
      </div>

      <div id="cartList" class="cart-list"></div>

      <div class="totals">
        <div class="total-row">
          <span>Tổng số phần</span>
          <span id="drawerQty">0</span>
        </div>
        <div class="total-row">
          <span>Tạm tính</span>
          <strong id="drawerTotal">0đ</strong>
        </div>
      </div>

      <div class="actions">
        <button class="ghost-btn" id="clearCartBtn">Xóa giỏ hàng</button>
        <button class="primary-btn" id="sendOrderBtn">Gửi nhà bếp</button>
      </div>

      <div id="sendStatus" class="status"></div>
    </div>
  </div>

    items: [
      { id: "bia_hoi", name: "Bia hơi", price: 8000, available: true },

      { id: "bia_chai", name: "Bia chai", price: 14000, available: true },
      { id: "nuoc_ngot", name: "Nước ngọt", price: 15000, available: true },
      { id: "nuoc_loc", name: "Nước lọc", price: 10000, available: true },

    const LS_CART_KEY = "qr_menu_cart_v2";
    const LS_TABLE_KEY = "qr_menu_table_v2";
    const LS_NOTE_KEY = "qr_menu_note_v2";

    let cart = {};
    let sending = false;
    let activeCategoryId = MENU[0]?.id || "";

    const money = (n) => new Intl.NumberFormat("vi-VN").format(n) + "đ";

    function buildMenuIndex() {
      const map = {};
      MENU.forEach(category => {
        category.items.forEach(item => {
          map[item.id] = { ...item, categoryId: category.id, categoryName: category.name };
        });
      });
      return map;
    }

    const MENU_INDEX = buildMenuIndex();

    function generateOrderId() {
      return "OD" + Date.now() + Math.floor(Math.random() * 1000);
    }

    function saveState() {
      localStorage.setItem(LS_CART_KEY, JSON.stringify(cart));
      localStorage.setItem(LS_TABLE_KEY, document.getElementById("tableSelect").value);
      localStorage.setItem(LS_NOTE_KEY, document.getElementById("orderNote").value);
    }

    function loadState() {
      try {
        cart = JSON.parse(localStorage.getItem(LS_CART_KEY) || "{}");
      } catch {
        cart = {};
      }

      const tableValue = localStorage.getItem(LS_TABLE_KEY);
      const noteValue = localStorage.getItem(LS_NOTE_KEY);

      if (tableValue) document.getElementById("tableSelect").value = tableValue;
      if (noteValue) document.getElementById("orderNote").value = noteValue;
    }

    function renderTableOptions() {
      const select = document.getElementById("tableSelect");
      select.innerHTML = '<option value="">-- Chọn bàn --</option>' +
        TABLES.map(t => `<option value="${t.id}">${t.name}</option>`).join("");
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = MENU.map(category => `
        <button class="tab-btn ${category.id === activeCategoryId ? "active" : ""}" data-tab="${category.id}">
          ${category.name}
        </button>
      `).join("");

      tabs.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeCategoryId = btn.dataset.tab;
          renderTabs();
          renderContent();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function renderContent() {
      const content = document.getElementById("content");
      const current = MENU.find(x => x.id === activeCategoryId) || MENU[0];

      content.innerHTML = `
        <div class="section">
          <div class="section-title">${current.name}</div>
          <div class="list">
            ${current.items.map(item => {
              const qty = cart[item.id]?.qty || 0;
              return `
                <div class="item ${item.available ? "" : "sold-out"}">
                  <div class="item-left">
                    <div class="item-name">${item.name}</div>
                    <div class="item-meta">
                      <span class="price">${money(item.price)}</span>
                    </div>
                    ${item.available ? "" : '<div class="sold-out-badge">Hết món</div>'}
                  </div>
                  <div class="item-right">
                    <div class="qty">
                      <button ${!item.available ? "disabled" : ""} data-action="minus" data-id="${item.id}">-</button>
                      <span class="count">${qty}</span>
                      <button ${!item.available ? "disabled" : ""} data-action="add" data-id="${item.id}">+</button>
                    </div>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;

      content.querySelectorAll("[data-action='add']").forEach(btn => {
        btn.addEventListener("click", () => addItem(btn.dataset.id));
      });

      content.querySelectorAll("[data-action='minus']").forEach(btn => {
        btn.addEventListener("click", () => minusItem(btn.dataset.id));
      });
    }

    function addItem(itemId) {
      const item = MENU_INDEX[itemId];
      if (!item || !item.available) return;

      if (!cart[itemId]) {
        cart[itemId] = {
          id: item.id,
          name: item.name,
          price: item.price,
          qty: 0
        };
      }

      cart[itemId].qty += 1;
      saveState();
      refreshUI();
    }

    function minusItem(itemId) {
      if (!cart[itemId]) return;
      cart[itemId].qty -= 1;
      if (cart[itemId].qty <= 0) delete cart[itemId];
      saveState();
      refreshUI();
    }

    function clearCart() {
      cart = {};
      saveState();
      refreshUI();
    }

    function getCartItems() {
      return Object.values(cart).filter(i => i.qty > 0);
    }

    function getTotals() {
      const items = getCartItems();
      const totalQty = items.reduce((sum, i) => sum + i.qty, 0);
      const totalPrice = items.reduce((sum, i) => sum + i.qty * i.price, 0);
      return { totalQty, totalPrice, items };
    }

    function renderCartBar() {
      const bar = document.getElementById("cartBar");
      const { totalQty, totalPrice } = getTotals();
      document.getElementById("cartCountText").innerText = `${totalQty} món`;
      document.getElementById("cartTotalText").innerText = `Tạm tính: ${money(totalPrice)}`;
      bar.style.display = totalQty > 0 ? "block" : "none";
    }

    function renderCartDrawer() {
      const list = document.getElementById("cartList");
      const { totalQty, totalPrice, items } = getTotals();

      if (items.length === 0) {
        list.innerHTML = `<div class="empty">Chưa có món nào trong giỏ hàng.</div>`;
      } else {
        list.innerHTML = items.map(item => `
          <div class="cart-item">
            <div>
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-sub">${money(item.price)} x ${item.qty}</div>
            </div>
            <div class="qty">
              <button data-action="minus-cart" data-id="${item.id}">-</button>
              <span class="count">${item.qty}</span>
              <button data-action="add-cart" data-id="${item.id}">+</button>
            </div>
          </div>
        `).join("");

        list.querySelectorAll("[data-action='add-cart']").forEach(btn => {
          btn.addEventListener("click", () => addItem(btn.dataset.id));
        });
        list.querySelectorAll("[data-action='minus-cart']").forEach(btn => {
          btn.addEventListener("click", () => minusItem(btn.dataset.id));
        });
      }

      document.getElementById("drawerQty").innerText = totalQty;
      document.getElementById("drawerTotal").innerText = money(totalPrice);
    }

    function refreshUI() {
      renderTabs();
      renderContent();
      renderCartBar();
      renderCartDrawer();
    }

    function openCart() {
      document.getElementById("cartOverlay").style.display = "block";
      renderCartDrawer();
    }

    function closeCart() {
      document.getElementById("cartOverlay").style.display = "none";
      setStatus("");
    }

    function setStatus(text, type = "") {
      const el = document.getElementById("sendStatus");
      el.className = "status" + (type ? " " + type : "");
      el.innerText = text || "";
    }

    function validateBeforeSend() {
      const tableId = document.getElementById("tableSelect").value;
      const { items } = getTotals();

      if (!tableId) {
        setStatus("Vui lòng chọn bàn trước khi gửi.", "err");
        return false;
      }

      if (!TABLES.some(t => t.id === tableId)) {
        setStatus("Bàn không hợp lệ.", "err");
        return false;
      }

      if (items.length === 0) {
        setStatus("Giỏ hàng đang trống.", "err");
        return false;
      }

      return true;
    }

    async function sendOrder() {
      if (sending) return;
      if (!validateBeforeSend()) return;

      sending = true;
      const btn = document.getElementById("sendOrderBtn");
      btn.disabled = true;
      btn.innerText = "Đang gửi...";

      const tableId = document.getElementById("tableSelect").value;
      const table = TABLES.find(t => t.id === tableId);
      const note = document.getElementById("orderNote").value.trim();
      const { items, totalQty, totalPrice } = getTotals();

      const payload = {
        order_id: generateOrderId(),
        table_id: table.id,
        table_name: table.name,
        note,
        total_qty: totalQty,
        total_price: totalPrice,
        created_at: new Date().toISOString(),
        items: items.map(i => ({
          item_id: i.id,
          item_name: i.name,
          qty: i.qty,
          unit_price: i.price,
          line_total: i.qty * i.price
        }))
      };

      try {
        const res = await fetch(WEB_APP_URL, {
  method: "POST",
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },
  body: JSON.stringify(payload)
});

const data = await res.json();

if (!res.ok || data.status !== "success") {
  throw new Error(data.message || "Gửi đơn thất bại");
}
        setStatus(`Đã gửi đơn thành công cho ${table.name}.`, "ok");
        cart = {};
        saveState();
        refreshUI();

        setTimeout(() => {
          closeCart();
        }, 800);

      } catch (err) {
        setStatus(err.message || "Lỗi mạng, chưa gửi được đơn.", "err");
      } finally {
        sending = false;
        btn.disabled = false;
        btn.innerText = "Gửi nhà bếp";
      }
    }

    function bindEvents() {
      document.getElementById("openCartBtn").addEventListener("click", openCart);
      document.getElementById("closeCartBtn").addEventListener("click", closeCart);
      document.getElementById("cartOverlay").addEventListener("click", (e) => {
        if (e.target.id === "cartOverlay") closeCart();
      });
      document.getElementById("clearCartBtn").addEventListener("click", clearCart);
      document.getElementById("sendOrderBtn").addEventListener("click", sendOrder);

      document.getElementById("tableSelect").addEventListener("change", saveState);
      document.getElementById("orderNote").addEventListener("input", saveState);
    }

    function init() {
      renderTableOptions();
      loadState();
      bindEvents();
      refreshUI();
    }

    init();
  </script>
</body>
</html>
